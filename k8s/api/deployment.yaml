apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-api-deployment
  labels:
    app: url-shortener-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener-api
  template:
    metadata:
      labels:
        app: url-shortener-api
    spec:
      containers:
      - name: urls
        image: urls:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: urls-port
        - containerPort: 8080