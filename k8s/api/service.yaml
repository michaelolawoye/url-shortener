apiVersion: v1
kind: Service
metadata:
  name: url-shortener-api-service
  labels:
    app: url-shortener-api
spec:
  ports:
    - port: 80 # port the service listens on
      targetPort: 8080 # port on each pod that the service redirects to
      protocol: TCP 
  selector:
    matchLabels:
      app: url-shortener-api